<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VISTA — 3D Virtual Quarter-Car</title>
<style>
  :root{ --bg:#0d1622; --panel:#13202fee; --line:#22374d; --ink:#d7e3ee;
         --dim:#7c93a8; --amber:#ffd166;
         --mono:"JetBrains Mono",ui-monospace,Menlo,Consolas,monospace }
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--mono);
       font-size:12px;overflow:hidden}
  #view{position:fixed;inset:0}
  .hud{position:fixed;background:var(--panel);border:1px solid var(--line);
       border-radius:6px;padding:10px 12px;backdrop-filter:blur(3px)}
  #title{top:12px;left:12px}
  #title b{letter-spacing:.14em;font-size:14px;color:#fff}
  #title span{color:var(--dim);font-size:10px;display:block;margin-top:3px}
  #panel{top:12px;right:12px;width:250px}
  #panel h3{font-size:9px;letter-spacing:.18em;color:var(--dim);margin:8px 0 6px}
  .row{display:flex;align-items:center;gap:7px;margin:6px 0}
  .row label{flex:0 0 74px;color:var(--dim);font-size:10px}
  .row output{flex:0 0 62px;text-align:right;color:var(--amber);font-size:10px}
  input[type=range]{flex:1;accent-color:var(--amber);height:3px}
  select,button{font-family:var(--mono);font-size:11px;background:#0f1b2a;
    color:var(--ink);border:1px solid var(--line);border-radius:4px;padding:5px 8px}
  select{width:100%} button{cursor:pointer} button:hover{border-color:var(--amber)}
  .btns{display:flex;gap:6px;flex-wrap:wrap}
  #tele{bottom:12px;left:12px;display:flex;gap:18px}
  #tele div b{display:block;font-size:17px;color:#fff}
  #tele div b.amber{color:var(--amber)}
  #tele div span{font-size:9px;color:var(--dim);letter-spacing:.1em}
  #hint{bottom:12px;right:12px;color:var(--dim);font-size:10px}
</style>
</head>
<body>
<canvas id="view"></canvas>

<div class="hud" id="title"><b>VISTA · 3D VIRTUAL QUARTER-CAR</b>
  <span>physics: RK4 0.25 ms · ECU 1 kHz · clipped semi-active damper · displacement ×8</span></div>

<div class="hud" id="panel">
  <h3>CONTROLLER</h3>
  <select id="ctrl">
    <option value="passive">Passive (2000 Ns/m)</option>
    <option value="sky2">Skyhook · two-state</option>
    <option value="skyc" selected>Skyhook · continuous</option>
    <option value="pid">Digital PID (6000 / 20)</option>
  </select>
  <h3>ROAD</h3>
  <div class="btns"><button id="bump">Speed bump</button><button id="pothole">Pothole</button></div>
  <div class="row"><label>roughness</label>
    <input type="range" id="rough" min="0" max="100" value="30"><output id="o_rough">30%</output></div>
  <div class="row"><label>speed</label>
    <input type="range" id="speed" min="10" max="80" step="5" value="20"><output id="o_speed">20 km/h</output></div>
  <h3>BENCH</h3>
  <div class="row"><label>time factor</label>
    <input type="range" id="tf" min="10" max="150" step="5" value="100"><output id="o_tf">1.00×</output></div>
  <div class="btns"><button id="pause">Pause</button><button id="reset">Reset</button></div>
</div>

<div class="hud" id="tele">
  <div><b id="t_rms">0.000</b><span>BODY ACC RMS m/s²</span></div>
  <div><b class="amber" id="t_gain">—</b><span>VS PASSIVE</span></div>
  <div><b id="t_c">2000</b><span>DAMPING Ns/m</span></div>
  <div><b id="t_tr">0.0</b><span>TRAVEL mm</span></div>
</div>
<div class="hud" id="hint">drag to orbit · wheel to zoom</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
"use strict";
/* ========================= PHYSICS (identical to bench) ================= */
const P={ms:250,mu:40,ks:10000,kt:190000}, DMP={cmin:500,cmax:3000,tau:0.015};
const DT=2.5e-4, TS=1e-3;
let x=[0,0,0,0], xp=[0,0,0,0], cActual=2000, cCmd=2000, simT=0, ecuAcc=0;
let events=[], paused=false;
const pid={vf:0,vfp:0,first:true};
const ui=id=>document.getElementById(id);

const roughBuf=new Float32Array(1<<17);
(function(){let z=0,s=42;const r=()=>{s=(s*1664525+1013904223)>>>0;return s/2**32*2-1;};
 for(let i=0;i<roughBuf.length;i++){z=0.997*z+0.0018*r();roughBuf[i]=z;}})();
function roadAt(t){
  const v=(+ui("speed").value)/3.6;
  let z=(+ui("rough").value)/100*1.4*
    roughBuf[(Math.round(t*1000)%roughBuf.length+roughBuf.length)%roughBuf.length];
  for(const e of events){const d=e.len/v,tau=t-e.t0;
    if(tau>=0&&tau<=d) z+=e.h*Math.sin(Math.PI*tau/d);}
  return z;
}
function deriv(s,fd,zr){const fs=P.ks*(s[0]-s[2]),ft=P.kt*(s[2]-zr);
  return [s[1],(-fs-fd)/P.ms,s[3],(fs+fd-ft)/P.mu];}
function step(st,c,zr){const f=s=>deriv(s,c*(s[1]-s[3]),zr);
  const k1=f(st),k2=f(st.map((v,i)=>v+.5*DT*k1[i])),
        k3=f(st.map((v,i)=>v+.5*DT*k2[i])),k4=f(st.map((v,i)=>v+DT*k3[i]));
  return st.map((v,i)=>v+DT/6*(k1[i]+2*k2[i]+2*k3[i]+k4[i]));}
function ecuTick(){
  const vb=x[1],vrel=x[1]-x[3],m=ui("ctrl").value; let fReq;
  if(m==="passive"){cCmd=2000;return;}
  if(m==="sky2") fReq=(vb*vrel>0?3000:500)*vrel;
  else if(m==="skyc") fReq=8000*vb;
  else{const a=TS/(0.010+TS);pid.vfp=pid.vf;
    if(pid.first){pid.vf=vb;pid.vfp=vb;pid.first=false;}else pid.vf+=a*(vb-pid.vf);
    fReq=Math.max(-4000,Math.min(4000,6000*vb+20*(pid.vf-pid.vfp)/TS));}
  if(Math.abs(vrel)<1e-4)cCmd=DMP.cmin;
  else{const c=fReq/vrel;cCmd=c<=0?DMP.cmin:Math.min(Math.max(c,DMP.cmin),DMP.cmax);}
}
/* rolling RMS buffers */
const HN=600; const hA=new Float32Array(HN), hAp=new Float32Array(HN);
let hI=0,hT=0;

/* ============================= 3D SCENE ================================= */
const EX=8;
const renderer=new THREE.WebGLRenderer({canvas:ui("view"),antialias:true});
renderer.shadowMap.enabled=true;
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0d1622);
scene.fog=new THREE.Fog(0x0d1622,9,26);
const cam=new THREE.PerspectiveCamera(42,1,0.1,100);

scene.add(new THREE.HemisphereLight(0x8fb8e0,0x0a1420,0.85));
const sun=new THREE.DirectionalLight(0xfff2d9,1.15);
sun.position.set(4,7,3); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-6;sun.shadow.camera.right=6;
sun.shadow.camera.top=6;sun.shadow.camera.bottom=-6;
scene.add(sun);

const M={
  body:new THREE.MeshStandardMaterial({color:0x1c3350,roughness:.45,metalness:.35}),
  accent:new THREE.MeshStandardMaterial({color:0xffd166,roughness:.5,metalness:.4}),
  steel:new THREE.MeshStandardMaterial({color:0x9fb4c7,roughness:.35,metalness:.8}),
  tire:new THREE.MeshStandardMaterial({color:0x14181d,roughness:.95}),
  rim:new THREE.MeshStandardMaterial({color:0xc9d6e3,roughness:.3,metalness:.9}),
  spring:new THREE.MeshStandardMaterial({color:0x69d58c,roughness:.4,metalness:.6}),
  damper:new THREE.MeshStandardMaterial({color:0xc8b08a,roughness:.4,metalness:.7,
                                         emissive:0x000000}),
  road:new THREE.MeshStandardMaterial({color:0x1a2c40,roughness:.9})
};

/* road: deformable strip, car travels +z, future ahead */
const ROAD_L=24, SEG=120;
const roadGeo=new THREE.PlaneGeometry(3.2,ROAD_L,1,SEG);
roadGeo.rotateX(-Math.PI/2);
const road=new THREE.Mesh(roadGeo,M.road);
road.receiveShadow=true; scene.add(road);
/* lane stripes for motion cue */
const stripes=[];
for(let i=0;i<12;i++){const s=new THREE.Mesh(
  new THREE.BoxGeometry(0.10,0.012,0.8),
  new THREE.MeshStandardMaterial({color:0x35506e}));
  s.position.set(-1.35,0.006,0); scene.add(s); stripes.push(s);}

/* wheel: tire torus + rim, axis along x */
const wheel=new THREE.Group();
const tire=new THREE.Mesh(new THREE.TorusGeometry(0.30,0.105,20,36),M.tire);
tire.rotation.y=Math.PI/2; tire.castShadow=true; wheel.add(tire);
const rim=new THREE.Mesh(new THREE.CylinderGeometry(0.185,0.185,0.16,24),M.rim);
rim.rotation.z=Math.PI/2; rim.castShadow=true; wheel.add(rim);
for(let i=0;i<5;i++){const sp=new THREE.Mesh(
  new THREE.BoxGeometry(0.05,0.31,0.05),M.steel);
  sp.rotation.x=i*Math.PI*2/5; wheel.add(sp);}
scene.add(wheel);
const WR=0.405;                       // rolling radius

/* knuckle / unsprung */
const knuckle=new THREE.Mesh(new THREE.BoxGeometry(0.34,0.16,0.42),M.steel);
knuckle.castShadow=true; scene.add(knuckle);

/* spring: helix tube, scaled in y */
function helixGeo(r,len,coils){
  const pts=[]; const N=coils*24;
  for(let i=0;i<=N;i++){const a=i/N*coils*2*Math.PI;
    pts.push(new THREE.Vector3(Math.cos(a)*r, i/N*len, Math.sin(a)*r));}
  return new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),N,0.028,8,false);
}
const SPR_REF=1.0;
const spring=new THREE.Mesh(helixGeo(0.16,SPR_REF,7),M.spring);
spring.castShadow=true; scene.add(spring);

/* damper: outer cylinder (from body) + rod (from knuckle) */
const dampOuter=new THREE.Mesh(new THREE.CylinderGeometry(0.075,0.075,0.55,18),M.damper);
const dampRod=new THREE.Mesh(new THREE.CylinderGeometry(0.028,0.028,0.8,12),M.steel);
dampOuter.castShadow=dampRod.castShadow=true;
scene.add(dampOuter,dampRod);

/* body corner: main block + roof accent + arch hint */
const body=new THREE.Group();
const shell=new THREE.Mesh(new THREE.BoxGeometry(1.5,0.55,2.1),M.body);
shell.castShadow=true; body.add(shell);
const sill=new THREE.Mesh(new THREE.BoxGeometry(1.54,0.08,2.14),M.accent);
sill.position.y=-0.30; body.add(sill);
scene.add(body);

/* geometry anchors (x lateral, y up, z forward) */
const SPR_X=-0.10, DMP_X=0.28;

/* camera orbit */
let yaw=0.9, pitch=0.32, dist=5.4, drag=false, px=0, py=0;
addEventListener("pointerdown",e=>{if(e.target.tagName==="CANVAS"){drag=true;px=e.clientX;py=e.clientY;}});
addEventListener("pointerup",()=>drag=false);
addEventListener("pointermove",e=>{if(!drag)return;
  yaw+=(e.clientX-px)*0.005; pitch=Math.min(1.2,Math.max(0.08,pitch+(e.clientY-py)*0.004));
  px=e.clientX;py=e.clientY;});
addEventListener("wheel",e=>{dist=Math.min(12,Math.max(2.6,dist+e.deltaY*0.003));});

function resize(){const w=innerWidth,h=innerHeight;
  renderer.setSize(w,h,false);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  cam.aspect=w/h;cam.updateProjectionMatrix();}
addEventListener("resize",resize);resize();

/* ============================ MAIN LOOP ================================= */
let last=performance.now(), roadOdo=0, wheelSpin=0;
function frame(now){
  requestAnimationFrame(frame);
  let dtw=(now-last)/1000; last=now;
  if(!paused){
    dtw=Math.min(dtw,0.05)*(+ui("tf").value)/100;
    const n=Math.round(dtw/DT), v=(+ui("speed").value)/3.6;
    for(let i=0;i<n;i++){
      ecuAcc+=DT; if(ecuAcc>=TS-1e-9){ecuTick();ecuAcc=0;}
      cActual+=(DT/(DMP.tau+DT))*(cCmd-cActual);
      const zr=roadAt(simT);
      x=step(x,cActual,zr); xp=step(xp,2000,zr);
      simT+=DT; roadOdo+=v*DT; wheelSpin+=v*DT/WR;
      hT+=DT; if(hT>=0.01){hT=0;
        hA[hI]=(-P.ks*(x[0]-x[2])-cActual*(x[1]-x[3]))/P.ms;
        hAp[hI]=(-P.ks*(xp[0]-xp[2])-2000*(xp[1]-xp[3]))/P.ms;
        hI=(hI+1)%HN;}
    }
    events=events.filter(e=>simT-e.t0<e.len/v+1);
  }
  render3d();
  telemetry();
  renderer.render(scene,cam);
}
requestAnimationFrame(frame);

function render3d(){
  const v=(+ui("speed").value)/3.6;
  const zr=roadAt(simT), zu=x[2], zs=x[0];

  /* road surface: vertex heights = road profile relative to car (z ahead) */
  const pos=roadGeo.attributes.position;
  for(let i=0;i<pos.count;i++){
    const z=pos.getZ(i);                        // -L/2 (ahead) .. +L/2 (behind)? plane z after rotate: y up
    const ahead=-z;                             // +ahead of the car
    pos.setY(i, roadAt(simT+ahead/v)*EX*0.35);
  }
  pos.needsUpdate=true; roadGeo.computeVertexNormals();

  /* stripes scroll toward -z (car moving +z) */
  stripes.forEach((s,i)=>{
    let zz=((i*2 - roadOdo)% (ROAD_L))+0;       // spacing 2 m
    zz=((zz%ROAD_L)+ROAD_L)%ROAD_L - ROAD_L/2;
    s.position.z=-zz;
    s.position.y=0.006+roadAt(simT+zz/v)*EX*0.35;
  });

  const yR=zr*EX*0.35, yU=0.32+zu*EX*0.35, yS=1.55+zs*EX*0.35;
  wheel.position.set(0,yR+WR*0.93,0);           // slight visual squash into road
  tire.rotation.x=rim.rotation.x=wheelSpin;
  wheel.children.forEach((c,i)=>{if(i>1)c.rotation.x=wheelSpin+(i-2)*Math.PI*2/5;});
  knuckle.position.set(0,yU+0.30,0);

  const sBot=yU+0.40, sTop=yS-0.28, sLen=Math.max(0.25,sTop-sBot);
  spring.position.set(SPR_X,sBot,0);
  spring.scale.y=sLen/SPR_REF;

  dampRod.position.set(DMP_X,sBot+0.40,0);
  dampOuter.position.set(DMP_X,sTop-0.27,0);
  const k=(cActual-DMP.cmin)/(DMP.cmax-DMP.cmin);
  M.damper.emissive.setRGB(0.45*k,0.08*k,0.02*k);

  body.position.set(0,yS,0);
  body.rotation.z=0.02*Math.sin(simT*0.0);      // reserved

  const cx=Math.sin(yaw)*Math.cos(pitch)*dist,
        cy=Math.sin(pitch)*dist+1.2,
        cz=Math.cos(yaw)*Math.cos(pitch)*dist;
  cam.position.set(cx,cy,cz);
  cam.lookAt(0,1.0,0);
}

function telemetry(){
  let s=0,sp=0; for(let i=0;i<HN;i++){s+=hA[i]*hA[i];sp+=hAp[i]*hAp[i];}
  const r=Math.sqrt(s/HN), rp=Math.sqrt(sp/HN);
  ui("t_rms").textContent=r.toFixed(3);
  ui("t_gain").textContent=rp>1e-3?((1-r/rp)*100).toFixed(1)+"%":"—";
  ui("t_c").textContent=Math.round(cActual);
  ui("t_tr").textContent=((x[0]-x[2])*1000).toFixed(1);
}

/* ============================== UI ===================================== */
[["rough","o_rough",v=>v+"%"],["speed","o_speed",v=>v+" km/h"],
 ["tf","o_tf",v=>(v/100).toFixed(2)+"×"]].forEach(([a,b,f])=>{
  const el=ui(a),up=()=>ui(b).textContent=f(el.value);
  el.addEventListener("input",up);up();});
ui("bump").onclick=()=>events.push({t0:simT+0.4,h:0.05,len:0.5});
ui("pothole").onclick=()=>events.push({t0:simT+0.4,h:-0.06,len:0.7});
ui("pause").onclick=()=>{paused=!paused;ui("pause").textContent=paused?"Resume":"Pause";};
ui("reset").onclick=()=>{x=[0,0,0,0];xp=[0,0,0,0];cActual=2000;events=[];
  hA.fill(0);hAp.fill(0);pid.first=true;};
ui("ctrl").addEventListener("change",()=>pid.first=true);
</script>
</body>
</html>
